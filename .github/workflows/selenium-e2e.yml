name: E2E Selenium Test Automation

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  e2e-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Backend Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install uvicorn fastapi pydantic

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm install

      - name: Install E2E Framework Dependencies
        run: |
          npm install

      - name: Start Servers and Run Headless Tests
        env:
          BASE_URL: http://127.0.0.1:5173
          BACKEND_URL: http://127.0.0.1:8000
          BROWSER: chrome
          HEADLESS: "true"
        run: |
          # 1. Start backend server
          cd backend
          python -m uvicorn main:app --host 127.0.0.1 --port 8000 &
          
          # 2. Start frontend dev server
          cd ../frontend
          npm run dev &
          
          # 3. Wait for servers to be active
          cd ..
          npx wait-on -t 45000 http-get://127.0.0.1:8000/api/wellness http://127.0.0.1:5173
          
          # 4. Execute E2E and dynamic tests
          npm test
        shell: bash


      - name: Upload Excel Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: E2E-Excel-Report
          path: excel/E2E_Report.xlsx

      - name: Upload Mochawesome HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Mochawesome-HTML-Report
          path: reports/

      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Execution-Logs
          path: logs/

      - name: Upload Failure Screenshots & Details
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: Failure-Artifacts
          path: reports/failures/
