name: E2E Selenium Test Automation

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  e2e-tests:
    name: Selenium E2E Automation Suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Backend Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt || pip install uvicorn fastapi pydantic

      - name: Install Frontend Dependencies
        run: |
          if [ -d "frontend" ]; then
            cd frontend && npm install && cd ..
          fi

      - name: Install E2E Framework Dependencies
        run: |
          npm install

      - name: Generate Dynamic 500+ Test Cases & 400 Load Test Spec Files & Excel Workbooks
        run: |
          node utilities/testdata.generator.js
          node utilities/generate_loadtest_400_spec.js
          node utilities/generate_advanced_spec_file.js
          node utilities/generate_350_spec_file.js
          node utilities/generate_400_spec_file.js
          node utilities/generate_excel_samples.js

      - name: Start Application Servers and Run Selenium Tests
        env:
          BASE_URL: http://127.0.0.1:5185
          BACKEND_URL: http://127.0.0.1:8000
          BROWSER: chrome
          HEADLESS: "true"
        run: |
          # 1. Start backend server if present
          if [ -d "backend" ]; then
            cd backend
            python -m uvicorn main:app --host 127.0.0.1 --port 8000 &
            cd ..
          fi
          
          # 2. Start frontend dev server if present
          if [ -d "frontend" ]; then
            cd frontend
            npm run dev &
            cd ..
          else
            npx http-server . -p 5185 &
          fi
          
          # 3. Wait for frontend server to be active
          npx wait-on -t 45000 http://127.0.0.1:5185
          
          # 4. Execute E2E, 400 Load Tests, and Advanced Features suites
          npx mocha tests/setup.js tests/loadtest_400_testcases.spec.js tests/selenium_advanced_features.spec.js --timeout 180000 --exit
        shell: bash

      - name: Upload Excel Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Selenium-Excel-Reports
          path: excel/

      - name: Upload Mochawesome HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Mochawesome-HTML-Report
          path: reports/

      - name: Upload Execution Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Execution-Logs
          path: logs/

      - name: Upload Failure Details (If Any)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: Failure-Artifacts
          path: reports/failures/