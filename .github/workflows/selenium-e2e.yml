name: E2E Selenium Test Automation

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  e2e-tests:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        browser: [chrome, firefox]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Setup Firefox & GeckoDriver
        if: matrix.browser == 'firefox'
        uses: browser-actions/setup-geckodriver@v1

      - name: Install Backend Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt || pip install uvicorn fastapi pydantic

      - name: Install Frontend Dependencies
        run: |
          if [ -d "frontend" ]; then
            cd frontend && npm install && cd ..
          fi

      - name: Install E2E Framework Dependencies
        run: |
          npm install

      - name: Generate Dynamic 500+ Test Cases
        run: |
          node utilities/testdata.generator.js

      - name: Start Servers and Run Headless Selenium Tests (${{ matrix.browser }})
        env:
          BASE_URL: http://127.0.0.1:5185
          BACKEND_URL: http://127.0.0.1:8000
          BROWSER: ${{ matrix.browser }}
          HEADLESS: "true"
        run: |
          # 1. Start backend server if present
          if [ -d "backend" ]; then
            cd backend
            python -m uvicorn main:app --host 127.0.0.1 --port 8000 &
            cd ..
          fi
          
          # 2. Start frontend dev server if present
          if [ -d "frontend" ]; then
            cd frontend
            npm run dev &
            cd ..
          else
            npx http-server . -p 5185 &
          fi
          
          # 3. Wait for frontend server to be active
          npx wait-on -t 45000 http://127.0.0.1:5185
          
          # 4. Execute E2E, Dynamic (500+), and Selenium Sample test suites
          npx mocha tests/setup.js tests/**/*.spec.js --timeout 120000 --exit
        shell: bash

      - name: Upload Excel Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: E2E-Excel-Report-${{ matrix.browser }}
          path: excel/E2E_Report.xlsx

      - name: Upload Mochawesome HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Mochawesome-HTML-Report-${{ matrix.browser }}
          path: reports/

      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Execution-Logs-${{ matrix.browser }}
          path: logs/

      - name: Upload Failure Screenshots & Details
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: Failure-Artifacts-${{ matrix.browser }}
          path: reports/failures/